# This file contains a Klipper config for the Prusa i3 Mk2.5S with a
# BIGTREETECH SKR mini E3 v3.0.
#
# To use this config, the firmware should be compiled with the following
# settings:
# - Micro-controller Architecture = STMicroelectronics STM32
# - Processor model = STM32G0B1
# - Bootloader offset = 8KiB bootloader (stm32duino)
# - Clock Reference = 8 MHz crystal
# - Communication interface = USB (on PA11/PA12)

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

# [include config/mk25s/display.cfg]
# [include config/custom/status.cfg]
# [include config/custom/status_original_prusa.cfg]
# [include config/custom/macro.cfg]
# [include config/custom/first_layer_calibration.cfg]
# [include config/custom/menu_original_prusa.cfg]
# [include config/custom/menu_autoload.cfg]
# [include config/custom/macro_cold_pull.cfg]
# [include config/custom/filament_diameter.cfg]
# [include config/custom/messages.cfg]
# [include config/custom/accelerometer.cfg]

# Plan of attack:
# [ ] [mcu] + [printer] → ensure board communication
# [ ] [stepper_x] → [tmc2209 stepper_x] → test X movement
# [ ] [stepper_y] → [tmc2209 stepper_y] → test Y movement
# [ ] [stepper_z] → [tmc2209 stepper_z] → test Z movement
# [ ] [extruder] → [tmc2209 extruder] → test extrusion
# [ ] [probe] → [temperature_sensor pinda] → safe Z homing
# [ ] [safe_z_home] + [bed_mesh] → verify probe grid
# [ ] [heater_bed] → [verify_heater heater_bed] → bed heating test
# [ ] [fan part_cooling_fan] + [heater_fan hotend_fan] → test fans
# [ ] [pause_resume] + [force_move] → optional safety
# [ ] [virtual_sdcard] → optional SD card
# [ ] [input_shaper] → optional tuning
# [ ] [verify_heater extruder] → after extruder is confirmed working
# [ ] [output_pin BEEPER_pin] + [board_pins] → optional / cosmetic

# =========================
#    CORE BOARD SETTINGS
# =========================
# [mcu]
# serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00

# [printer]
# kinematics: cartesian
# max_velocity: 200
# max_accel: 2000
# square_corner_velocity: 5
# max_z_velocity: 20
# max_z_accel: 100

# =========================
#    MOTION SYSTEM
# =========================
# [stepper_x]
# step_pin: PB13
# dir_pin: !PB12
# enable_pin: !PB14
# rotation_distance: 32
# position_endstop: 0
# position_max: 250
# position_min: 0
# homing_speed: 35
# homing_retract_dist: 3
# microsteps: 16
# endstop_pin: ^PC0

# [tmc2209 stepper_x]
# uart_pin: PC11
# tx_pin: PC10
# uart_address: 0
# run_current: 0.580
# stealthchop_threshold: 999999

# [stepper_y]
# step_pin: PB10
# dir_pin: !PB2
# enable_pin: !PB11
# rotation_distance: 32
# position_endstop: -2.2
# position_max: 210
# position_min: -2.2
# homing_speed: 35
# homing_retract_dist: 6
# microsteps: 16
# endstop_pin: ^PC1

# [tmc2209 stepper_y]
# uart_pin: PC11
# tx_pin: PC10
# uart_address: 2
# run_current: 0.580
# stealthchop_threshold: 999999

# [stepper_z]
# step_pin: PB0
# dir_pin: PC5
# enable_pin: !PB1
# rotation_distance: 8
# position_max: 205
# position_min: -2
# homing_speed: 14
# homing_retract_dist: 1
# microsteps: 16
# endstop_pin: probe:z_virtual_endstop

# [tmc2209 stepper_z]
# uart_pin: PC11
# tx_pin: PC10
# uart_address: 1
# run_current: 0.580
# stealthchop_threshold: 999999

# [extruder]
# step_pin: PB3
# dir_pin: !PB4
# enable_pin: !PD1
# rotation_distance: 11.4285714286
# microsteps: 16
# heater_pin: PC8
# # E3D Revo heaters ship with the Semitec 104NT thermistor that Klipper
# # exposes as ATC Semitec 104NT-4-R025H42G. Updating the sensor keeps the
# # temperature readout and safety checks aligned with the 12V Revo hardware.
# sensor_type: ATC Semitec 104NT-4-R025H42G
# sensor_pin: PA0
# min_temp: 10
# max_temp: 305
# filament_diameter: 1.750
# #control: pid
# #pid_Kp: 40.925
# #pid_Ki: 4.875
# #pid_Kd: 86.085
# # The max extrude cross section is increased for the purge line, but in theory
# # its probably a bad idea to have it this large, as its purpose is to catch poorly sliced
# # objects that extrude way too much for small moves
# max_extrude_cross_section: 5.0
# #max_extrude_only_distance: 80.0
# #used for autoload
# max_extrude_only_distance: 210.0
# max_extrude_only_velocity: 120.0
# max_extrude_only_accel: 1250.0

# [tmc2209 extruder]
# uart_pin: PC11
# tx_pin: PC10
# uart_address: 3
# run_current: 0.650

# [verify_heater extruder]
# max_error: 45
# hysteresis: 15

# =========================
#    PROBE & SAFE HOMING
# =========================
# [probe]
# pin: ^PC14
# #x_offset: 23 #PRUSA ORIGINAL FIRMWARE
# #y_offset: 9 #PRUSA ORIGINAL FIRMWARE
# #z_offset: .4 #PRUSA ORIGINAL FIRMWARE
# x_offset: 23.5
# y_offset: 8
# speed: 10.0
# samples: 3
# samples_result: median
# samples_tolerance: 0.01
# samples_tolerance_retries: 3
# #pressure_advance: 0.0775 #PLA  0.40 mm
# #pressure_advance: 0.085  #PETG 0.40 mm
# #pressure_advance: 0.078  #ASA  0.40 mm
# #pressure_advance: 0.105  #ABS  0.40 mm

# #nozzle_diameter: 0.600
# #pressure_advance: 0.065 #PLA  0.60 mm
# #pressure_advance: 0.100 #PETG 0.60 mm

# [temperature_sensor pinda]
# # PINDA 2 thermistor (MK2.5 upgrade)
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: PA1
# min_temp: 0
# max_temp: 105
# gcode_id: PINDA

# # VALUES FROM THE ORIGINAL PRUSA FIRMWARE (FOR REFERENCE)
# #define X_PROBE_OFFSET_FROM_EXTRUDER 23     // Z probe to nozzle X offset: -left  +right
# #define Y_PROBE_OFFSET_FROM_EXTRUDER 9     // Z probe to nozzle Y offset: -front +behind
# #define Z_PROBE_OFFSET_FROM_EXTRUDER -0.4  // Z probe to nozzle Z offset: -below (always!)

# [safe_z_home]
# home_xy_position: 11.5,-2
# z_hop: 5

# =========================
#    BED & MESH
# =========================
# [bed_mesh]
# speed: 100
# mesh_min: 35,6
# mesh_max: 238,202
# probe_count: 3,3
# mesh_pps: 2,2
# algorithm: lagrange

# # VALUES FROM THE ORIGINAL PRUSA FIRMWARE (FOR REFERENCE)
# #define MESH_MIN_X 35
# #define MESH_MAX_X 238
# #define MESH_MIN_Y 6
# #define MESH_MAX_Y 202

# =========================
#    HEATERS & FANS
# =========================
# [heater_bed]
# heater_pin: PC9
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: PC4
# #control: watermark
# min_temp: 0
# max_temp: 125

# [verify_heater heater_bed]
# max_error: 120
# #max_error: 360
# # customizable to 360 if it give problems at 100+ °C on Prusa MK2
# #   The maximum "cumulative temperature error" before raising an
# #   error. Smaller values result in stricter checking and larger
# #   values allow for more time before an error is reported.
# #   Specifically, the temperature is inspected once a second and if it
# #   is close to the target temperature then an internal "error
# #   counter" is reset; otherwise, if the temperature is below the
# #   target range then the counter is increased by the amount the
# #   reported temperature differs from that range. Should the counter
# #   exceed this "max_error" then an error is raised. The default is
# #   120.
# heating_gain: 2
# # customizable to 1 if it give problems at 100+ °C on Prusa MK2
# # heating_gain: 1
# #   The minimum temperature (in Celsius) that the heater must increase
# #   by during the check_gain_time check. It is rare to customize this
# #   value. The default is 2.

# [fan part_cooling_fan]
# pin: PC6
# hardware_pwm: True
# kick_start_time: 1.00

# [heater_fan hotend_fan]
# pin: PC7
# hardware_pwm: True
# heater: extruder
# heater_temp: 50.0
# fan_speed: 1.0

# [heater_fan motherboard_fan]
# pin: PB15

# =========================
#    SAFETY & UTILITY
# =========================
# [pause_resume]
# recover_velocity: 50

# [force_move]
# enable_force_move: True

# [virtual_sdcard]
# path: ~/printer_data/gcodes

# =========================
#    ADVANCED FEATURES
# =========================
# [input_shaper]
# # previous shaper_freq_x: 64 (shaper_type_x: ei)
# shaper_freq_x: 58.0
# shaper_type_x: mzv
# # previous shaper_freq_y: 59.2 (shaper_type_y: mzv)
# shaper_freq_y: 45.0
# shaper_type_y: mzv

# =========================
#    OPTIONAL / COSMETIC
# =========================
# [output_pin BEEPER_pin]
# pin: PH2
# pwm: True
# value: 0
# shutdown_value: 0
# cycle_time: 0.0004
